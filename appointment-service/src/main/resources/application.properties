spring.application.name=Appointment-service

server.port=8083

spring.datasource.url=jdbc:postgresql://localhost:5432/appointment_db
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD:2580}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true

# CRITICAL: Enable Feign Fallbacks (Circuit Breaker)
feign.circuitbreaker.enabled=true

# B7 FIX: JWT secret via environment variable. Falls back to local dev value.
jwt.secret=${JWT_SECRET:HMhuTySndewzOnY5tGb5w4ESJhyEwzFLJQX72uRpQ5R}

# B5 FIX: Shared internal secret for Feign inter-service calls (slot book/release).
