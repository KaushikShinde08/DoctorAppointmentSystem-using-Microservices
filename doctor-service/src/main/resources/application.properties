spring.application.name=DOCTOR-SERVICE

server.port=8082

# B7 FIX: Use environment variable for DB credentials. Falls back to local dev value if not set.
# In production: set environment variable DB_PASSWORD
spring.datasource.url=jdbc:postgresql://localhost:5432/doctor_db
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD:2580}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true

# B5 FIX: Shared internal secret — must match appointment-service internal.secret.
# Only the appointment-service (via Feign) sends this header. External callers are rejected.
internal.secret=${INTERNAL_SECRET:my-internal-secret-key-2024}