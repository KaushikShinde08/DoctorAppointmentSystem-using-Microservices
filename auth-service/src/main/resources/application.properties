spring.application.name=auth-service
server.port=8081

spring.datasource.driver-class-name=org.postgresql.Driver
# B7 FIX: Use environment variable for DB credentials. Falls back to local dev value if not set.
# In production: set environment variables DB_PASSWORD and JWT_SECRET
spring.datasource.url=jdbc:postgresql://localhost:5432/auth_db
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD:2580}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true

# B7 FIX: JWT secret via environment variable. Falls back to local dev value.
jwt.secret=${JWT_SECRET:HMhuTySndewzOnY5tGb5w4ESJhyEwzFLJQX72uRpQ5R}